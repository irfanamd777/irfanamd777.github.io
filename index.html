<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextUp Pakistan | Insights</title>
    <style>
        :root {
            --dark-bg: #000000;
            --logo-blue: #7EDCFF; /* Updated to blueprint's recommended highlight: #7EDCFF */
            --pure-white: #ffffff;
            --nav-gray: #111111;
            --supporting-text: #D9D9D9; /* Added from blueprint */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--pure-white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Responsive Navigation */
        nav {
            background-color: var(--nav-gray);
            padding: 0 2% 0 3%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
            height: 100px; 
        }

        .brand {
            display: flex;
            align-items: center;
            text-decoration: none;
            height: 100%;
        }

        .brand img {
            height: 160px; 
            width: auto;
            object-fit: contain;
            transform: translateY(12px);
            transition: transform 0.3s ease;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 25px;
            align-items: center;
            padding-right: 2%;
        }

        .nav-links a {
            color: var(--pure-white);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--logo-blue);
        }

        .cta-btn {
            background-color: var(--logo-blue);
            color: var(--dark-bg) !important;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 700 !important;
            text-transform: uppercase;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.3s;
        }

        .cta-btn:hover {
            opacity: 0.9;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                height: auto;
                padding: 15px 20px;
                gap: 5px;
            }

            .brand img {
                height: 100px;
                transform: translateY(0); 
                margin-top: 0;
            }

            .nav-links {
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
                padding-bottom: 10px;
                padding-right: 0;
            }
        }

        /* Content Layout */
        .main-content {
            max-width: 850px;
            margin: 40px auto;
            padding: 0 25px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            color: var(--logo-blue);
            font-size: 3rem;
            margin-bottom: 20px;
        }

        /* Newsletter Specific Styles */
